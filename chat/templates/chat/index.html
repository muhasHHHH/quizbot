<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizBot — Викторина</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: #16213e;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        /* Шапка */
        .header {
            background: linear-gradient(135deg, #0f3460, #533483);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 1.4rem; }
        .header span { font-size: 0.85rem; opacity: 0.8; }
        .header a {
            color: #e2b96f;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .header a:hover { text-decoration: underline; }

        /* Чат */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user {
            background: #0f3460;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.bot {
            background: #1a1a4e;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border-left: 3px solid #533483;
        }
        .message .label {
            font-size: 0.72rem;
            opacity: 0.6;
            margin-bottom: 4px;
        }

        /* Форма имени */
        #name-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 40px;
        }
        #name-screen h2 { color: #e2b96f; font-size: 1.6rem; }
        #name-screen p { opacity: 0.7; text-align: center; }
        #name-screen input {
            width: 100%;
            max-width: 320px;
            padding: 12px 16px;
            border-radius: 8px;
            border: 2px solid #533483;
            background: #0f3460;
            color: #eee;
            font-size: 1rem;
            outline: none;
        }
        #name-screen input:focus { border-color: #e2b96f; }
        #name-screen button {
            padding: 12px 32px;
            background: linear-gradient(135deg, #533483, #0f3460);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        #name-screen button:hover { opacity: 0.85; }

        /* Ввод сообщения */
        .input-area {
            padding: 16px;
            display: flex;
            gap: 10px;
            background: #0d0d1a;
            border-top: 1px solid #2a2a5e;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 2px solid #533483;
            background: #1a1a2e;
            color: #eee;
            font-size: 0.95rem;
            outline: none;
        }
        .input-area input:focus { border-color: #e2b96f; }
        .input-area button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #533483, #0f3460);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .input-area button:hover { opacity: 0.85; }

        /* Быстрые кнопки */
        .quick-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 16px 12px;
            background: #0d0d1a;
        }
        .quick-btns button {
            padding: 6px 14px;
            background: #1a1a4e;
            color: #e2b96f;
            border: 1px solid #533483;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.82rem;
        }
        .quick-btns button:hover { background: #533483; color: #fff; }

        .chat-area { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .chat-area.active { display: flex; }

        /* Скролл */
        .chat-box::-webkit-scrollbar { width: 5px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: #533483; border-radius: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>🎯 QuizBot</h1>
            <span>Бот для тестирования знаний</span>
        </div>
        <a href="/history/">📋 История</a>
    </div>

    <!-- Экран ввода имени -->
    <div id="name-screen">
        <h2>👋 Добро пожаловать!</h2>
        <p>Это QuizBot — бот для проверки знаний по Python, математике и общим темам.</p>
        <input type="text" id="name-input" placeholder="Введи своё имя..." maxlength="30" />
        <button onclick="setName()">Начать ▶</button>
    </div>

    <!-- Область чата -->
    <div class="chat-area" id="chat-area">
        <div class="chat-box" id="chat-box"></div>

        <div class="quick-btns">
            <button onclick="sendQuick('старт')">▶ Старт</button>
            <button onclick="sendQuick('python')">🐍 Python</button>
            <button onclick="sendQuick('математика')">📐 Математика</button>
            <button onclick="sendQuick('общие')">🌍 Общие</button>
            <button onclick="sendQuick('счёт')">📊 Счёт</button>
            <button onclick="sendQuick('помощь')">❓ Помощь</button>
            <button onclick="sendQuick('сброс')">🔄 Сброс</button>
        </div>

        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Введи сообщение или A/B/C/D..." maxlength="200" />
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>
</div>

<script>
    let userName = '';

    function setName() {
        const nameInput = document.getElementById('name-input');
        const name = nameInput.value.trim();
        if (!name) { alert('Введи имя!'); return; }

        fetch('/send/', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRFToken': getCookie('csrftoken')},
            body: 'user_name=' + encodeURIComponent(name)
        })
        .then(r => r.json())
        .then(data => {
            userName = data.user_name;
            document.getElementById('name-screen').style.display = 'none';
            document.getElementById('chat-area').classList.add('active');
            addMessage('bot', 'QuizBot', data.bot_response);
        });
    }

    function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text) return;

        addMessage('user', userName, text);
        input.value = '';

        fetch('/send/', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRFToken': getCookie('csrftoken')},
            body: 'message=' + encodeURIComponent(text)
        })
        .then(r => r.json())
        .then(data => {
            addMessage('bot', 'QuizBot', data.bot_response);
        })
        .catch(() => {
            addMessage('bot', 'QuizBot', '❌ Ошибка соединения. Попробуй снова.');
        });
    }

    function sendQuick(text) {
        document.getElementById('msg-input').value = text;
        sendMessage();
    }

    function addMessage(type, name, text) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = 'message ' + type;

        // Заменяем **текст** на жирный
        const formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        div.innerHTML = `<div class="label">${name}</div>${formatted}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function getCookie(name) {
        let value = null;
        document.cookie.split(';').forEach(c => {
            const [k, v] = c.trim().split('=');
            if (k === name) value = decodeURIComponent(v);
        });
        return value;
    }

    // Enter для отправки
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            if (document.getElementById('name-screen').style.display !== 'none') setName();
            else sendMessage();
        }
    });
</script>
</body>
</html>
